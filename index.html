<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shy Daddy Thumbnail Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- Logo -->
    <img class="logo"
         src="Untitled196_20260624233654.png"
         alt="Shy Daddy Thumbnail Store">

    <!-- FREE PACK -->
    <div class="card">
      <h2>🆓 FREE PACK</h2>

      <img class="pack"
           src="Untitled197_20260625000503.jpg"
           alt="Free Pack">

      <a href="https://drive.google.com/uc?export=download&id=1qXZsrjEaz1z4GnX7y9hVV4f4tQ6PHzoc">
        <img class="button"
             src="Untitled196_20260624233526.png"
             alt="Download">
      </a>
    </div>

    <!-- PAID PACK -->
    <div class="card">
      <h2>💰 PAID PACK</h2>

      <img class="pack"
           src="Untitled197_20260625000212.jpg"
           alt="Paid Pack">

      <img id="buyBtn"
           class="button"
           src="Untitled196_20260624235730.png"
           alt="Buy Now">
    </div>

    <footer>
      © 2026 Shy Daddy
    </footer>

  </div>

  <!-- Popup -->
  <div id="popup" class="popup">

    <div class="popup-box">

      <img class="social"
           src="Untitled196_20260624233943.png"
           alt="Discord"
           onclick="window.open('https://discord.gg/rjsej6YsuU','_blank')">

      <img class="social"
           src="Untitled196_20260624234111.png"
           alt="Instagram"
           onclick="window.open('https://www.instagram.com/5hyvansh?igsh=MXVvZjNqN3NpanJvZw==','_blank')">

      <img class="social"
           src="Untitled196_20260624234841.png"
           alt="Email"
           onclick="window.location.href='mailto:shyvanshworks@gmail.com'">

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
